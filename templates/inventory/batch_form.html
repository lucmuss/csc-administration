{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="page-shell">
  <h1>{{ title }}</h1>
  {% if error %}
    <div class="flash flash--danger">{{ error }}</div>
  {% endif %}
  <form method="post" class="form-stack">
    {% csrf_token %}
    <div class="field">
      <label for="id_strain">Sorte</label>
      <select id="id_strain" name="strain" class="form-input form-select" required>
        {% for strain in strains %}
          <option value="{{ strain.id }}">{{ strain.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="id_batch_number">Chargennummer</label>
      <input id="id_batch_number" name="batch_number" class="form-input" required>
    </div>
    <div class="field-grid">
      <div class="field">
        <label for="id_harvest_date">Erntedatum</label>
        <input id="id_harvest_date" name="harvest_date" type="date" class="form-input">
      </div>
      <div class="field">
        <label for="id_total_harvested_grams">Erntemenge gesamt</label>
        <input id="id_total_harvested_grams" name="total_harvested_grams" type="number" step="0.01" class="form-input" required>
      </div>
    </div>
    <div class="field">
      <label for="id_available_grams">Verfuegbarer Bestand</label>
      <input id="id_available_grams" name="available_grams" type="number" step="0.01" class="form-input" required>
    </div>
    <button type="submit" class="btn-primary">Charge speichern</button>
  </form>
</section>
{% endblock %}
