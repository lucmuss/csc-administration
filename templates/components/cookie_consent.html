{% if ga_tracking_id %}
<section class="cookie-banner hidden" data-cookie-banner>
  <div class="cookie-banner__copy">
    <p class="cookie-banner__title">Datenschutz-Einstellungen</p>
    <p>
      Analytik wird erst nach ausdruecklicher Zustimmung geladen.
      <a href="{% url 'core:privacy' %}">Mehr erfahren</a>
    </p>
  </div>
  <div class="cookie-banner__actions">
    <button type="button" class="btn-ghost" data-cookie-decline>Ablehnen</button>
    <button type="button" class="btn-primary" data-cookie-accept>Akzeptieren</button>
  </div>
</section>
{% endif %}
