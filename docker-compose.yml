services:
  db:
    image: postgres:16-alpine
    container_name: csc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-csc}
      POSTGRES_USER: ${POSTGRES_USER:-csc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-csc}
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-csc} -d ${POSTGRES_DB:-csc}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  web:
    build: .
    container_name: csc_web
    restart: unless-stopped
    command: bash -c "python src/manage.py migrate && python src/manage.py collectstatic --noinput && python src/manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-csc}
      DATABASE_USER: ${POSTGRES_USER:-csc}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-csc}
      DATABASE_URL: postgresql://${POSTGRES_USER:-csc}:${POSTGRES_PASSWORD:-csc}@db:5432/${POSTGRES_DB:-csc}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
