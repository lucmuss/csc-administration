{# templates/components/cookie_consent.html #}
{% load static %}

{% if ga_tracking_id %}
<div id="cookie-consent-banner" class="fixed bottom-0 left-0 right-0 bg-slate-800 text-white p-4 shadow-lg z-50 hidden">
  <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
    <div class="text-sm">
      <p class="font-semibold mb-1">Datenschutz-Einstellungen</p>
      <p class="text-slate-300">
        Wir verwenden Google Analytics zur Verbesserung unserer Website. 
        <a href="{% url 'privacy' %}" class="underline hover:text-white">Mehr erfahren</a>
      </p>
    </div>
    <div class="flex gap-2">
      <button id="cookie-decline" class="px-4 py-2 text-sm bg-slate-600 hover:bg-slate-500 rounded transition-colors">
        Ablehnen
      </button>
      <button id="cookie-accept" class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-500 rounded transition-colors">
        Akzeptieren
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  // Pruefe ob Consent bereits gesetzt
  var consent = localStorage.getItem('cookie_consent_analytics');
  var banner = document.getElementById('cookie-consent-banner');
  
  if (consent === null) {
    // Noch nicht entschieden - Banner anzeigen
    banner.classList.remove('hidden');
  }
  
  // Accept Button
  document.getElementById('cookie-accept').addEventListener('click', function() {
    localStorage.setItem('cookie_consent_analytics', 'true');
    banner.classList.add('hidden');
    // GA nachladen
    location.reload();
  });
  
  // Decline Button
  document.getElementById('cookie-decline').addEventListener('click', function() {
    localStorage.setItem('cookie_consent_analytics', 'false');
    banner.classList.add('hidden');
  });
})();
</script>
{% endif %}
