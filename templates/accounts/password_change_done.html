{% extends 'base.html' %}
{% block title %}Passwort aktualisiert{% endblock %}
{% block content %}
  <section class="auth-layout">
    <div class="auth-copy panel">
      <p class="eyebrow">Kontosicherheit</p>
      <h1>Dein Passwort wurde erfolgreich aktualisiert.</h1>
      <p class="lede">Du kannst jetzt mit dem neuen Passwort weiterarbeiten.</p>
    </div>
    <div class="auth-card panel">
      <div class="panel__header">
        <div>
          <p class="panel__eyebrow">Weiter</p>
          <h2>Zurueck in den Bereich</h2>
        </div>
      </div>
      <a href="{% url 'members:profile' %}" class="btn-primary btn-block">Zum Profil</a>
    </div>
  </section>
{% endblock %}
