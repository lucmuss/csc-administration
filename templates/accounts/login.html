{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="mx-auto max-w-md card">
  <h1 class="mb-4 text-xl font-semibold">Login</h1>
  <form method="post" class="space-y-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Anmelden</button>
  </form>
</div>
{% endblock %}
