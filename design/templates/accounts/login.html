{% extends "base.html" %}

{% block title %}Login - CSC Administration{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="text-6xl mb-4">🌿</div>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                CSC Administration
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                Cannabis Social Club Verwaltungssystem
            </p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="email" class="sr-only">E-Mail-Adresse</label>
                    <input id="email" name="email" type="email" required 
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-csc-green focus:border-csc-green focus:z-10 sm:text-sm"
                           placeholder="E-Mail-Adresse">
                </div>
                <div>
                    <label for="password" class="sr-only">Passwort</label>
                    <input id="password" name="password" type="password" required
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-csc-green focus:border-csc-green focus:z-10 sm:text-sm"
                           placeholder="Passwort">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                           class="h-4 w-4 text-csc-green focus:ring-csc-green border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900">
                        Angemeldet bleiben
                    </label>
                </div>

                <div class="text-sm">
                    <a href="{% url 'password_reset' %}" class="font-medium text-csc-green hover:text-csc-green-dark">
                        Passwort vergessen?
                    </a>
                </div>
            </div>

            <div>
                <button type="submit"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-csc-green hover:bg-csc-green-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-csc-green">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <svg class="h-5 w-5 text-csc-green-dark group-hover:text-csc-green" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    Anmelden
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-sm text-gray-600">
                Noch kein Mitglied?
                <a href="{% url 'members:register' %}" class="font-medium text-csc-green hover:text-csc-green-dark">
                    Jetzt bewerben
                </a>
            </p>
        </div>
        
        <!-- Legal Links -->
        <div class="text-center mt-8 pt-8 border-t border-gray-200">
            <p class="text-xs text-gray-500">
                <a href="{% url 'legal:datenschutz' %}" class="hover:text-csc-green">Datenschutz</a> • 
                <a href="{% url 'legal:impressum' %}" class="hover:text-csc-green">Impressum</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
